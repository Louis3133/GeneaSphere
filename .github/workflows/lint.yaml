name: Lint

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install
        env:
          TURSO_DATABASE_URL: file:local.db
          TURSO_AUTH_TOKEN: dummy_token
          BETTER_AUTH_SECRET: dummy_secret
          BETTER_AUTH_URL: http://localhost:3000
          GITHUB_CLIENT_ID: dummy_id
          GITHUB_CLIENT_SECRET: dummy_secret
          GOOGLE_CLIENT_ID: dummy_id
          GOOGLE_CLIENT_SECRET: dummy_secret
          TEST_SESSION_COOKIE: dummy_cookie

      - name: Run lint
        run: pnpm lint
